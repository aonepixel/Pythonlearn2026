<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Arial', sans-serif;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f4f4f9;
        }
        .calculator {
            width: 320px;
            background-color: #1c1c1c;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.3);
        }
        .display {
            width: 100%;
            height: 60px;
            background-color: #1c1c1c;
            border: none;
            color: #ffffff;
            font-size: 2.5rem;
            text-align: right;
            padding: 0 10px;
            margin-bottom: 20px;
            outline: none;
        }
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }
        button {
            height: 60px;
            border-radius: 50%;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover {
            opacity: 0.8;
        }
        .btn-number {
            background-color: #333333;
            color: white;
        }
        .btn-operator {
            background-color: #ff9f0a;
            color: white;
        }
        .btn-clear {
            background-color: #a5a5a5;
            color: black;
        }
    </style>
</head>
<body>

    <div class="calculator">
        <!-- The form submits button clicks back to the Flask server -->
        <form method="POST">
            <input type="text" name="display" class="display" value=" " readonly>
            
            <div class="buttons">
                <button type="submit" name="action" value="C" class="btn-clear">C</button>
                <button type="submit" name="action" value="(" class="btn-clear">(</button>
                <button type="submit" name="action" value=")" class="btn-clear">)</button>
                <button type="submit" name="action" value="÷" class="btn-operator">÷</button>

                <button type="submit" name="action" value="7" class="btn-number">7</button>
                <button type="submit" name="action" value="8" class="btn-number">8</button>
                <button type="submit" name="action" value="9" class="btn-number">9</button>
                <button type="submit" name="action" value="×" class="btn-operator">×</button>

                <button type="submit" name="action" value="4" class="btn-number">4</button>
                <button type="submit" name="action" value="5" class="btn-number">5</button>
                <button type="submit" name="action" value="6" class="btn-number">6</button>
                <button type="submit" name="action" value="-" class="btn-operator">-</button>

                <button type="submit" name="action" value="1" class="btn-number">1</button>
                <button type="submit" name="action" value="2" class="btn-number">2</button>
                <button type="submit" name="action" value="3" class="btn-number">3</button>
                <button type="submit" name="action" value="+" class="btn-operator">+</button>

                <button type="submit" name="action" value="0" class="btn-number" style="grid-column: span 2; border-radius: 30px;">0</button>
                <button type="submit" name="action" value="." class="btn-number">.</button>
                <button type="submit" name="action" value="=" class="btn-operator">=</button>
            </div>
        </form>
    </div>

</body>
</html>
